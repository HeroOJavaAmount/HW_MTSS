input {
  beats {
    port => 5000
  }
}

filter {
  json {
    source => "message"
  }
  date {
    match => [ "timestamp", "ISO8601" ]
    target => "@timestamp"
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "money-transfer-%{+YYYY.MM.dd}"
  }
  stdout { codec => rubydebug }
}
